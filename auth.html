<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ticket Terminator — Staff Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --red: #ef4444;
    --radius: 12px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .logo {
    font-size: 32px;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }
  .sub {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 28px;
  }
  label {
    display: block;
    text-align: left;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 16px;
  }
  input[type="password"]:focus { border-color: var(--accent); }
  input[type="password"].error { border-color: var(--red); }
  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn:hover:not(:disabled) { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .err-msg {
    color: var(--red);
    font-size: 13px;
    margin-top: 10px;
    min-height: 18px;
  }
  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎯</div>
  <h1>Ticket Terminator</h1>
  <p class="sub">Staff dashboard — authorized access only</p>

  <label for="pw">Password</label>
  <input type="password" id="pw" placeholder="Enter staff password" autofocus
    onkeydown="if(event.key==='Enter')login()"/>
  <button class="btn" id="btn" onclick="login()">Sign In →</button>
  <div class="err-msg" id="err"></div>

  <p class="footer">Ticket Terminator HQ &copy; 2026</p>
</div>

<script>
async function login() {
  const pw  = document.getElementById('pw');
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');

  pw.classList.remove('error');
  err.textContent = '';
  btn.disabled    = true;
  btn.textContent = 'Signing in…';

  try {
    const res = await fetch('/.netlify/functions/auth', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ password: pw.value }),
    });
    const data = await res.json();

    if (!res.ok || !data.token) {
      pw.classList.add('error');
      err.textContent = data.error || 'Incorrect password. Try again.';
      pw.value = '';
      pw.focus();
      return;
    }

    sessionStorage.setItem('tt_auth_token', data.token);
    window.location.href = '/dashboard.html';

  } catch (e) {
    err.textContent = 'Could not reach the server. Check your connection.';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Sign In →';
  }
}

// If already authed, skip to dashboard
(async () => {
  const token = sessionStorage.getItem('tt_auth_token');
  if (!token) return;
  try {
    const res = await fetch(`/.netlify/functions/auth?token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (data.valid) window.location.href = '/dashboard.html';
  } catch {}
})();
</script>
</body>
</html>
